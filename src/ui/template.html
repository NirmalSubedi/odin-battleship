<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Template</title>
  </head>

  <body>
    <!-- screens: mode, name, fleet, pass, over, player1, player2 -->
    <div class="screen-overlay" data-screen="fleet">
      <header>
        <h1 class="game-name">BattleShip</h1>
        <div class="announce"><span class="message">Place Fleet</span></div>
      </header>

      <div class="instructions">
        <p class="message" data-hint="attack"></p>
      </div>

      <div class="game-modes">
        <div class="single-player" tabindex="0">
          <div class="icon">
            <div class="player"></div>
          </div>
          <p class="title">Single Player</p>
        </div>

        <div class="double-player" tabindex="0">
          <div class="icon">
            <div class="player"></div>
            <div class="player alternative"></div>
          </div>
          <p class="title">Double Player</p>
        </div>
      </div>

      <div class="name-selection">
        <div class="player1">
          <div class="icon">
            <div class="player"></div>
          </div>

          <label for="player1-name">Player 1 Name:</label>
          <input
            type="text"
            name="player1-name"
            id="player1-name"
            placeholder="Player 1"
            maxlength="15"
          />
        </div>
        <div class="player2">
          <div class="icon">
            <div class="player alternative"></div>
          </div>
          <label for="player2-name">Player 2 Name:</label>
          <input
            type="text"
            name="player2-name"
            id="player2-name"
            placeholder="Player 2"
            maxlength="15"
          />
        </div>
      </div>

      <main>
        <div class="game-board">
          <div class="board">
            <div class="column-numbers">
              <span>A</span>
              <span>B</span>
              <span>C</span>
              <span>D</span>
              <span>E</span>
              <span>F</span>
              <span>G</span>
              <span>H</span>
              <span>I</span>
              <span>J</span>
            </div>
            <div class="row-numbers">
              <span>1</span>
              <span>2</span>
              <span>3</span>
              <span>4</span>
              <span>5</span>
              <span>6</span>
              <span>7</span>
              <span>8</span>
              <span>9</span>
              <span>10</span>
            </div>
            <div class="cells">
              <button class="cell" data-x="1" data-y="1"></button>
              <button class="cell" data-x="2" data-y="1"></button>
              <button class="cell" data-x="3" data-y="1"></button>
              <button class="cell" data-x="4" data-y="1"></button>
              <button class="cell" data-x="5" data-y="1"></button>
              <button class="cell" data-x="6" data-y="1"></button>
              <button class="cell" data-x="7" data-y="1"></button>
              <button class="cell" data-x="8" data-y="1"></button>
              <button class="cell" data-x="9" data-y="1"></button>
              <button class="cell" data-x="10" data-y="1"></button>
              <button class="cell" data-x="1" data-y="2"></button>
              <button class="cell" data-x="2" data-y="2"></button>
              <button class="cell" data-x="3" data-y="2"></button>
              <button class="cell" data-x="4" data-y="2"></button>
              <button class="cell" data-x="5" data-y="2"></button>
              <button class="cell" data-x="6" data-y="2"></button>
              <button class="cell" data-x="7" data-y="2"></button>
              <button class="cell" data-x="8" data-y="2"></button>
              <button class="cell" data-x="9" data-y="2"></button>
              <button class="cell" data-x="10" data-y="2"></button>
              <button class="cell" data-x="1" data-y="3"></button>
              <button class="cell" data-x="2" data-y="3"></button>
              <button class="cell" data-x="3" data-y="3"></button>
              <button class="cell" data-x="4" data-y="3"></button>
              <button class="cell" data-x="5" data-y="3"></button>
              <button class="cell" data-x="6" data-y="3"></button>
              <button class="cell" data-x="7" data-y="3"></button>
              <button class="cell" data-x="8" data-y="3"></button>
              <button class="cell" data-x="9" data-y="3"></button>
              <button class="cell" data-x="10" data-y="3"></button>
              <button class="cell" data-x="1" data-y="4"></button>
              <button class="cell" data-x="2" data-y="4"></button>
              <button class="cell" data-x="3" data-y="4"></button>
              <button class="cell" data-x="4" data-y="4"></button>
              <button class="cell" data-x="5" data-y="4"></button>
              <button class="cell" data-x="6" data-y="4"></button>
              <button class="cell" data-x="7" data-y="4"></button>
              <button class="cell" data-x="8" data-y="4"></button>
              <button class="cell" data-x="9" data-y="4"></button>
              <button class="cell" data-x="10" data-y="4"></button>
              <button class="cell" data-x="1" data-y="5"></button>
              <button class="cell" data-x="2" data-y="5"></button>
              <button class="cell" data-x="3" data-y="5"></button>
              <button class="cell" data-x="4" data-y="5"></button>
              <button class="cell" data-x="5" data-y="5"></button>
              <button class="cell" data-x="6" data-y="5"></button>
              <button class="cell" data-x="7" data-y="5"></button>
              <button class="cell" data-x="8" data-y="5"></button>
              <button class="cell" data-x="9" data-y="5"></button>
              <button class="cell" data-x="10" data-y="5"></button>
              <button class="cell" data-x="1" data-y="6"></button>
              <button class="cell" data-x="2" data-y="6"></button>
              <button class="cell" data-x="3" data-y="6"></button>
              <button class="cell" data-x="4" data-y="6"></button>
              <button class="cell" data-x="5" data-y="6"></button>
              <button class="cell" data-x="6" data-y="6"></button>
              <button class="cell" data-x="7" data-y="6"></button>
              <button class="cell" data-x="8" data-y="6"></button>
              <button class="cell" data-x="9" data-y="6"></button>
              <button class="cell" data-x="10" data-y="6"></button>
              <button class="cell" data-x="1" data-y="7"></button>
              <button class="cell" data-x="2" data-y="7"></button>
              <button class="cell" data-x="3" data-y="7"></button>
              <button class="cell" data-x="4" data-y="7"></button>
              <button class="cell" data-x="5" data-y="7"></button>
              <button class="cell" data-x="6" data-y="7"></button>
              <button class="cell" data-x="7" data-y="7"></button>
              <button class="cell" data-x="8" data-y="7"></button>
              <button class="cell" data-x="9" data-y="7"></button>
              <button class="cell" data-x="10" data-y="7"></button>
              <button class="cell" data-x="1" data-y="8"></button>
              <button class="cell" data-x="2" data-y="8"></button>
              <button class="cell" data-x="3" data-y="8"></button>
              <button class="cell" data-x="4" data-y="8"></button>
              <button class="cell" data-x="5" data-y="8"></button>
              <button class="cell" data-x="6" data-y="8"></button>
              <button class="cell" data-x="7" data-y="8"></button>
              <button class="cell" data-x="8" data-y="8"></button>
              <button class="cell" data-x="9" data-y="8"></button>
              <button class="cell" data-x="10" data-y="8"></button>
              <button class="cell" data-x="1" data-y="9"></button>
              <button class="cell" data-x="2" data-y="9"></button>
              <button class="cell" data-x="3" data-y="9"></button>
              <button class="cell" data-x="4" data-y="9"></button>
              <button class="cell" data-x="5" data-y="9"></button>
              <button class="cell" data-x="6" data-y="9"></button>
              <button class="cell" data-x="7" data-y="9"></button>
              <button class="cell" data-x="8" data-y="9"></button>
              <button class="cell" data-x="9" data-y="9"></button>
              <button class="cell" data-x="10" data-y="9"></button>
              <button class="cell" data-x="1" data-y="10"></button>
              <button class="cell" data-x="2" data-y="10"></button>
              <button class="cell" data-x="3" data-y="10"></button>
              <button class="cell" data-x="4" data-y="10"></button>
              <button class="cell" data-x="5" data-y="10"></button>
              <button class="cell" data-x="6" data-y="10"></button>
              <button class="cell" data-x="7" data-y="10"></button>
              <button class="cell" data-x="8" data-y="10"></button>
              <button class="cell" data-x="9" data-y="10"></button>
              <button class="cell" data-x="10" data-y="10"></button>
            </div>
            <div class="ship-count">
              Ships Left: <span class="ships"></span>
            </div>
            <div class="board-label">Player John's Board</div>
          </div>
        </div>

        <aside>
          <div class="controls">
            <p class="message" data-hint="place">
              <span class="control">Place: </span>Click empty square
            </p>
            <p class="message" data-hint="rotate">
              <span class="control">Rotate: </span>Click placed ship
            </p>
          </div>

          <div class="fleet">
            <p class="fleet-label">Fleet</p>
            <div class="dock">
              <div class="ship">
                <div class="ship-part"></div>
                <div class="ship-part"></div>
                <div class="ship-part"></div>
                <div class="ship-part"></div>
                <div class="ship-part"></div>
              </div>
              <div class="ship">
                <div class="ship-part"></div>
                <div class="ship-part"></div>
                <div class="ship-part"></div>
              </div>
              <div class="ship">
                <div class="ship-part"></div>
                <div class="ship-part"></div>
              </div>
              <div class="ship">
                <div class="ship-part"></div>
                <div class="ship-part"></div>
                <div class="ship-part"></div>
                <div class="ship-part"></div>
              </div>
              <div class="ship">
                <div class="ship-part"></div>
                <div class="ship-part"></div>
                <div class="ship-part"></div>
              </div>
            </div>
          </div>
        </aside>
      </main>

      <dialog class="stats">
        <button class="close-stats">X</button>
        <h2 class="title">Stats</h2>
        <div class="player1-stats">
          <p class="ships-sunk">Ships sunk: <span class="stat"></span></p>
          <p class="hit-accuracy">Hits Accuracy: <span class="stat"></span></p>
          <p class="shots-fired">Shots Fired: <span class="stat"></span></p>
        </div>
        <div class="player2-stats">
          <p class="ships-sunk">Ships sunk: <span class="stat"></span></p>
          <p class="hit-accuracy">Hits Accuracy: <span class="stat"></span></p>
          <p class="shots-fired">Shots Fired: <span class="stat"></span></p>
        </div>
      </dialog>

      <div class="buttons">
        <button class="randomize-board">Randomize</button>
        <button class="rematch">Rematch</button>
        <button class="continue">Continue</button>
        <button class="stats">Stats</button>
        <button class="home-screen">Home</button>
        <button class="reset-board">Reset</button>
      </div>
    </div>
  </body>
</html>
